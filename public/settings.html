<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: rgba(255,255,255,0.85); padding: 16px; height: 100vh; overflow-y: auto; }
    h2 { font-size: 14px; margin-bottom: 14px; font-weight: 500; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .field input { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; font-size: 12px; outline: none; }
    .field input:focus { border-color: rgba(233,69,96,0.6); }
    .field .hint { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 3px; line-height: 1.3; }
    .btns { display: flex; gap: 8px; margin-top: 16px; }
    .btns button { flex: 1; padding: 8px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; }
    .btn-primary { background: #4caf50; color: #fff; }
    .btn-primary:hover { background: #66bb6a; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .msg { font-size: 11px; margin-top: 10px; color: #4caf50; display: none; }
    .toggle-field { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .toggle-field .toggle-label { font-size: 12px; color: rgba(255,255,255,0.75); }
    .toggle-field .toggle-hint { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; line-height: 1.3; }
    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,0.15); border-radius: 22px; transition: 0.2s; }
    .slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
    .switch input:checked + .slider { background: #4caf50; }
    .switch input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body>
  <h2>服务器设置</h2>
  <div class="field" id="authCodeDisplay" style="display: none;">
    <label>服务器验证码（分享给客户端）</label>
    <div style="display: flex; gap: 8px; align-items: center;">
      <input type="text" id="authCodeValue" readonly style="flex: 1; font-weight: 600; letter-spacing: 2px; text-align: center; cursor: default;">
      <button class="btn-secondary" id="regenBtn" style="flex: 0 0 auto; padding: 10px 16px;">重新生成</button>
    </div>
    <div class="hint">其他设备连接此服务器时需要输入此验证码</div>
  </div>
  <div class="field">
    <label>服务器地址</label>
    <input type="text" id="serverAddr" placeholder="留空则本机作为服务器">
    <div class="hint">留空 = 本机运行服务器 | 填写其他电脑IP = 连接远程服务器</div>
  </div>
  <div class="field" id="clientAuthCodeField" style="display: none;">
    <label>服务器验证码</label>
    <input type="text" id="clientAuthCode" placeholder="输入服务器的6位验证码" maxlength="6">
    <div class="hint">向服务器管理员索取验证码</div>
  </div>
  <div class="field">
    <label>示例</label>
    <div class="hint">http://10.1.21.102:3456</div>
  </div>
  <div class="toggle-field">
    <div>
      <div class="toggle-label">总是浮动在最上层</div>
      <div class="toggle-hint">便签始终显示在其他窗口之上</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="alwaysOnTop">
      <span class="slider"></span>
    </label>
  </div>
  <div class="btns">
    <button class="btn-secondary" onclick="window.close()">取消</button>
    <button class="btn-primary" id="saveBtn">保存</button>
  </div>
  <div class="msg" id="msg">保存成功（置顶设置立即生效，服务器地址需重启应用）</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const currentServer = params.get('server') || '';

    async function init() {
      if (window.electronAPI) {
        const cfg = await window.electronAPI.getConfig();
        document.getElementById('serverAddr').value = cfg.serverAddress || '';
        document.getElementById('alwaysOnTop').checked = !!cfg.alwaysOnTop;
        document.getElementById('clientAuthCode').value = cfg.clientAuthCode || '';

        // 显示或隐藏相关字段
        const isServer = !cfg.serverAddress;
        if (isServer && cfg.authCode) {
          document.getElementById('authCodeDisplay').style.display = 'block';
          document.getElementById('authCodeValue').value = cfg.authCode;
        }
        if (!isServer) {
          document.getElementById('clientAuthCodeField').style.display = 'block';
        }
      } else {
        document.getElementById('serverAddr').value = currentServer === 'http://localhost:3456' ? '' : currentServer;
        try {
          const saved = JSON.parse(localStorage.getItem('stickyNotesConfig') || '{}');
          document.getElementById('alwaysOnTop').checked = !!saved.alwaysOnTop;
          document.getElementById('clientAuthCode').value = saved.clientAuthCode || '';
          if (currentServer && currentServer !== 'http://localhost:3456') {
            document.getElementById('clientAuthCodeField').style.display = 'block';
          }
        } catch {}
      }
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const addr = document.getElementById('serverAddr').value.trim();
      const alwaysOnTop = document.getElementById('alwaysOnTop').checked;
      const clientAuthCode = document.getElementById('clientAuthCode').value.trim();
      const cfg = { serverAddress: addr, alwaysOnTop, clientAuthCode };
      if (window.electronAPI) {
        await window.electronAPI.setConfig(cfg);
      } else {
        localStorage.setItem('stickyNotesConfig', JSON.stringify(cfg));
      }
      const msg = document.getElementById('msg');
      msg.style.display = 'block';
      setTimeout(() => window.close(), 1500);
    });

    // 重新生成验证码
    if (window.electronAPI) {
      document.getElementById('regenBtn')?.addEventListener('click', async () => {
        const result = await window.electronAPI.generateAuthCode();
        document.getElementById('authCodeValue').value = result.authCode;
      });
    }

    init();
  </script>
</body>
</html>
