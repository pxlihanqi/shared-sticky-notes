<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共享便签</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; min-height: 100vh; padding: 20px; }
    h1 { color: rgba(255,255,255,0.8); font-size: 20px; margin-bottom: 16px; font-weight: 500; }
    .board { position: relative; width: 100%; height: calc(100vh - 100px); overflow: auto; }
    .note { position: absolute; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.35); display: flex; flex-direction: column; min-width: 180px; min-height: 140px; cursor: move; }
    .note:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.5); }
    .note.dragging { opacity: 0.9; z-index: 9999; }
    .note-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; border-radius: 10px 10px 0 0; background: rgba(0,0,0,0.12); flex-shrink: 0; }
    .note-title { font-size: 10px; opacity: 0.6; }
    .note-actions { display: flex; gap: 3px; position: relative; }
    .note-actions button { background: rgba(0,0,0,0.2); border: none; color: inherit; width: 20px; height: 20px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .note-actions button:hover { background: rgba(0,0,0,0.4); }
    .note-dropdown { display: none; position: absolute; top: 22px; right: 0; background: rgba(30,30,50,0.98); border-radius: 8px; padding: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); z-index: 200; min-width: 120px; }
    .note-dropdown.show { display: block; }
    .note-dropdown button { display: block; width: 100%; background: transparent; border: none; color: #fff; padding: 7px 10px; text-align: left; font-size: 12px; cursor: pointer; border-radius: 6px; transition: background 0.15s; white-space: nowrap; }
    .note-dropdown button:hover { background: rgba(76,175,80,0.6); }
    .board::-webkit-scrollbar { display: none; }
    .board { -ms-overflow-style: none; scrollbar-width: none; }
    .note-body::-webkit-scrollbar { width: 3px; }
    .note-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
    .note-body { flex: 1; padding: 8px 10px; overflow: auto; }
    .note-content { width: 100%; height: 100%; border: none; background: transparent; color: inherit; font-size: 13px; line-height: 1.5; resize: none; font-family: inherit; outline: none; }
    .note-image { max-width: 100%; border-radius: 6px; cursor: pointer; }
    .note-file { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: rgba(0,0,0,0.1); border-radius: 6px; text-decoration: none; color: inherit; margin-top: 3px; font-size: 12px; }
    .add-btn { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #4caf50; color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(76,175,80,0.4); transition: all 0.2s; }
    .add-btn:hover { transform: scale(1.1); background: #66bb6a; }
    .resize-handle { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; }
    .color-picker { position: absolute; bottom: -72px; left: 0; display: flex; gap: 4px; background: rgba(22,33,62,0.95); padding: 4px 8px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.5); z-index: 100; flex-wrap: wrap; width: fit-content; }
    .color-picker input[type="range"] { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
    .color-picker input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #4caf50; cursor: pointer; }
    .color-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .color-dot:hover { transform: scale(1.2); }
    .color-dot.active { border-color: #fff; }
    .status { position: fixed; top: 20px; right: 20px; font-size: 12px; color: rgba(255,255,255,0.4); }
    .status.connected { color: #4caf50; }
    .header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .header h1 { margin-bottom: 0; }
    .search-box { position: relative; flex: 0 1 280px; }
    .search-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 8px 12px 8px 32px; border-radius: 20px; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: rgba(76,175,80,0.7); }
    .search-input::placeholder { color: rgba(255,255,255,0.4); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; pointer-events: none; }
    .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; display: none; }
    .search-clear.show { display: block; }
    .search-count { font-size: 11px; color: rgba(255,255,255,0.4); margin-left: 8px; }
    .note.search-hidden { display: none; }
    .toolbox-toggle { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: all 0.2s; }
    .toolbox-toggle:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
    .global-toolbox { display: none; position: fixed; top: 60px; left: 20px; background: rgba(30,30,50,0.95); border-radius: 12px; padding: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 1000; min-width: 220px; }
    .global-toolbox.show { display: block; }
    .global-toolbox-content { display: flex; flex-direction: column; gap: 8px; }
    .global-toolbox-item { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 13px; transition: background 0.2s; }
    .global-toolbox-item:hover { background: rgba(255,255,255,0.2); }
    .note-images { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .note-image-item { position: relative; width: 100%; }
    .img-del-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; border: none; background: rgba(220,53,53,0.85); color: #fff; font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.15s; display: flex; align-items: center; justify-content: center; }
    .note-image-item:hover .img-del-btn { opacity: 1; }

    /* 文本工具箱侧边栏 */
    .web-toolbox { position: fixed; top: 0; right: 0; width: 340px; height: 100vh; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10000; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .web-toolbox.show { transform: translateX(0); }
    .web-toolbox::-webkit-scrollbar { width: 4px; }
    .web-toolbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .wtb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .wtb-title { font-size: 12px; font-weight: 600; opacity: 0.9; }
    .wtb-header-actions { display: flex; gap: 6px; align-items: center; }
    .wtb-close { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; }
    .wtb-close:hover { background: rgba(255,255,255,0.25); }
    .wtb-copy, .wtb-clear { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; white-space: nowrap; }
    .wtb-copy:hover { background: rgba(33,150,243,0.6); }
    .wtb-clear:hover { background: rgba(244,67,54,0.6); }
    .wtb-undo { background: rgba(76,175,80,0.35); border: 1px solid rgba(76,175,80,0.5); color: #fff; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; white-space: nowrap; }
    .wtb-undo:hover:not(:disabled) { background: rgba(76,175,80,0.7); }
    .wtb-undo:disabled { opacity: 0.3; cursor: not-allowed; }
    .wtb-stats { font-size: 10px; opacity: 0.55; margin-bottom: 8px; }
    .wtb-stats-line { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.6; }
    .wtb-group { margin-bottom: 8px; }
    .wtb-group-title { font-size: 10px; opacity: 0.45; margin-bottom: 4px; }
    .wtb-btns { display: flex; flex-wrap: wrap; gap: 4px; }
    .wtb-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: background 0.15s; }
    .wtb-btn:hover { background: rgba(76,175,80,0.75); }
    .wtb-btn:active { background: rgba(76,175,80,0.95); }
    .wtb-btn.md-active { background: rgba(76,175,80,0.85); }

    /* Markdown 预览 */
    .markdown-preview { flex: 1; overflow-y: auto; padding: 4px 8px; font-size: 13px; line-height: 1.6; cursor: pointer; word-break: break-word; color: inherit; }
    .markdown-preview h1 { font-size: 1.5em; margin: 0.5em 0; font-weight: 600; }
    .markdown-preview h2 { font-size: 1.3em; margin: 0.4em 0; font-weight: 600; }
    .markdown-preview h3 { font-size: 1.1em; margin: 0.4em 0; font-weight: 600; }
    .markdown-preview p { margin: 0.4em 0; }
    .markdown-preview ul, .markdown-preview ol { margin: 0.4em 0; padding-left: 1.5em; }
    .markdown-preview li { margin: 0.2em 0; }
    .markdown-preview code { background: rgba(0,0,0,0.15); padding: 0.1em 0.3em; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 0.9em; }
    .markdown-preview pre { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; overflow-x: auto; margin: 0.5em 0; }
    .markdown-preview pre code { background: transparent; padding: 0; }
    .markdown-preview blockquote { border-left: 3px solid rgba(0,0,0,0.3); margin: 0.5em 0; padding: 0.3em 0.8em; opacity: 0.85; }
    .markdown-preview a { text-decoration: underline; opacity: 0.9; }
    .markdown-preview img { max-width: 100%; border-radius: 4px; }
    .markdown-preview table { border-collapse: collapse; width: 100%; margin: 0.5em 0; font-size: 12px; }
    .markdown-preview th, .markdown-preview td { border: 1px solid rgba(0,0,0,0.2); padding: 4px 8px; text-align: left; }
    .markdown-preview th { background: rgba(0,0,0,0.1); font-weight: 600; }

    /* 查找替换面板 */
    .find-replace { position: fixed; top: 0; right: 0; width: 340px; height: auto; max-height: 280px; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .find-replace.show { transform: translateX(0); }
    .fr-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .fr-title { font-size: 12px; font-weight: 600; opacity: 0.9; }
    .fr-close { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; }
    .fr-close:hover { background: rgba(255,255,255,0.25); }
    .fr-find, .fr-replace { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 5px 8px; border-radius: 6px; font-size: 12px; margin-bottom: 5px; outline: none; }
    .fr-find:focus, .fr-replace:focus { border-color: rgba(76,175,80,0.75); }
    .fr-find::placeholder, .fr-replace::placeholder { color: rgba(255,255,255,0.4); }
    .fr-opts { display: flex; gap: 12px; font-size: 11px; opacity: 0.8; margin-bottom: 6px; }
    .fr-opts label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .fr-actions { display: flex; gap: 6px; }
    .fr-btn { flex: 1; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: background 0.15s; }
    .fr-btn:hover { background: rgba(76,175,80,0.75); }
    .fr-status { font-size: 10px; opacity: 0.6; margin-top: 5px; min-height: 12px; }

    /* RSA 面板 */
    .rsa-panel { position: fixed; top: 0; right: 0; width: 340px; height: 100vh; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .rsa-panel.show { transform: translateX(0); }
    .rsa-panel::-webkit-scrollbar { width: 4px; }
    .rsa-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .rsa-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .rsa-title { font-size: 12px; font-weight: 600; opacity: 0.9; }
    .rsa-close { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; }
    .rsa-close:hover { background: rgba(255,255,255,0.25); }
    .rsa-info { font-size: 10px; opacity: 0.55; margin-bottom: 8px; }
    .rsa-key { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 10px; margin-bottom: 6px; outline: none; font-family: 'Courier New', monospace; resize: vertical; min-height: 48px; white-space: pre; overflow-x: auto; }
    .rsa-key:focus { border-color: rgba(76,175,80,0.75); }
    .rsa-key::placeholder { color: rgba(255,255,255,0.4); font-family: -apple-system, sans-serif; }
    .rsa-actions { display: flex; gap: 6px; margin-bottom: 6px; }
    .rsa-btn { flex: 1; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: background 0.15s; }
    .rsa-btn:hover { background: rgba(76,175,80,0.75); }
    .rsa-status { font-size: 10px; opacity: 0.7; margin-top: 4px; min-height: 12px; }
    .rsa-batch-opt { display: flex; align-items: center; gap: 6px; font-size: 11px; opacity: 0.85; margin-bottom: 8px; cursor: pointer; }
    .rsa-batch-opt input { cursor: pointer; }

    /* Excel 模板面板 */
    .excel-template { position: fixed; top: 0; right: 0; width: 340px; height: 100vh; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .excel-template.show { transform: translateX(0); }
    .excel-template::-webkit-scrollbar { width: 4px; }
    .excel-template::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .et-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .et-title { font-size: 12px; font-weight: 600; opacity: 0.9; }
    .et-close { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; }
    .et-close:hover { background: rgba(255,255,255,0.25); }
    .et-upload-btn { width: 100%; background: rgba(76,175,80,0.6); border: none; color: #fff; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 8px; transition: background 0.15s; }
    .et-upload-btn:hover { background: rgba(76,175,80,0.85); }
    .et-info { font-size: 11px; opacity: 0.7; margin-bottom: 8px; line-height: 1.5; }
    .et-columns { font-size: 10px; opacity: 0.85; margin-bottom: 8px; max-height: 70px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
    .et-col-chip { display: inline-block; background: rgba(76,175,80,0.35); border: 1px solid rgba(76,175,80,0.5); color: #fff; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 10px; transition: background 0.15s; }
    .et-col-chip:hover { background: rgba(76,175,80,0.7); }
    .et-template { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 11px; margin-bottom: 6px; outline: none; font-family: 'Courier New', monospace; resize: vertical; min-height: 60px; }
    .et-template:focus { border-color: rgba(76,175,80,0.75); }
    .et-template::placeholder { color: rgba(255,255,255,0.4); }
    .et-actions { display: flex; gap: 6px; margin-bottom: 6px; }
    .et-btn { flex: 1; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: background 0.15s; }
    .et-btn:hover { background: rgba(76,175,80,0.75); }
    .et-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .et-preview { font-size: 10px; opacity: 0.8; margin-top: 6px; max-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 6px 8px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
    .et-columns::-webkit-scrollbar { width: 3px; }
    .et-columns::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* 图片预览遮罩 */
    .image-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 99999; cursor: pointer; }
    .image-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

    /* TOTP 面板 */
    .totp-panel { position: fixed; top: 0; right: 0; width: 340px; height: 100vh; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .totp-panel.show { transform: translateX(0); }
    .totp-panel::-webkit-scrollbar { width: 4px; }
    .totp-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .totp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .totp-title { font-size: 12px; font-weight: 600; opacity: 0.9; }
    .totp-close { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; }
    .totp-close:hover { background: rgba(255,255,255,0.25); }
    .totp-add-section { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .totp-input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 11px; margin-bottom: 6px; outline: none; font-family: 'Courier New', monospace; }
    .totp-input:focus { border-color: rgba(76,175,80,0.75); }
    .totp-input::placeholder { color: rgba(255,255,255,0.4); font-family: -apple-system, sans-serif; }
    .totp-add-btn { width: 100%; background: rgba(76,175,80,0.6); border: none; color: #fff; padding: 7px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.15s; }
    .totp-add-btn:hover { background: rgba(76,175,80,0.85); }
    .totp-list { display: flex; flex-direction: column; gap: 8px; }
    .totp-item { background: rgba(255,255,255,0.06); border-radius: 8px; padding: 10px; position: relative; }
    .totp-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .totp-item-name { font-size: 12px; font-weight: 600; opacity: 0.9; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .totp-item-del { background: rgba(244,67,54,0.5); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .totp-item-del:hover { background: rgba(244,67,54,0.8); }
    .totp-code { font-size: 28px; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: 4px; text-align: center; margin: 4px 0; cursor: pointer; user-select: all; }
    .totp-code:hover { opacity: 0.8; }
    .totp-code.copied { color: #4caf50; }
    .totp-progress { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .totp-progress-bar { height: 100%; background: #4caf50; border-radius: 2px; transition: width 1s linear; }
    .totp-item-meta { font-size: 10px; opacity: 0.5; text-align: center; margin-top: 2px; }
    .totp-empty { text-align: center; color: rgba(255,255,255,0.3); font-size: 12px; padding: 20px 0; }

    /* 密码生成面板 */
    .pwdgen-panel { position: fixed; top: 0; right: 0; width: 340px; height: auto; max-height: 100vh; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .pwdgen-panel.show { transform: translateX(0); }
    .pwdgen-panel::-webkit-scrollbar { width: 4px; }
    .pwdgen-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .pwdgen-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .pwdgen-title { font-size: 12px; font-weight: 600; opacity: 0.9; }

    .pwdgen-copy:hover { background: rgba(76,175,80,0.85); }

    .pwdgen-gen-btn { width: 100%; background: rgba(76,175,80,0.6); border: none; color: #fff; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.15s; }

    /* Cron 面板 */
    .cron-panel { position: fixed; top: 0; right: 0; width: 340px; height: auto; max-height: 100vh; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .cron-panel.show { transform: translateX(0); }
    .cron-panel::-webkit-scrollbar { width: 4px; }
    .cron-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .cron-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cron-title { font-size: 12px; font-weight: 600; opacity: 0.9; }

    .cron-close:hover { background: rgba(255,255,255,0.25); }
    .cron-input-row { display: flex; gap: 4px; margin-bottom: 10px; }
    .cron-field { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .cron-field-label { font-size: 9px; opacity: 0.5; text-transform: uppercase; }
    .cron-field-input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 5px 2px; border-radius: 4px; font-size: 12px; text-align: center; font-family: 'Courier New', monospace; outline: none; }
    .cron-field-input:focus { border-color: rgba(76,175,80,0.75); }
    .cron-result { background: rgba(0,0,0,0.3); border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 1px; user-select: all; word-break: break-all; }
    .cron-desc { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 10px; line-height: 1.5; min-height: 18px; }
    .cron-next { font-size: 10px; opacity: 0.5; margin-bottom: 10px; line-height: 1.6; white-space: pre-line; }
    .cron-section-title { font-size: 10px; opacity: 0.45; margin-bottom: 6px; margin-top: 4px; }
    .cron-presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .cron-preset { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: background 0.15s; }
    .cron-preset:hover { background: rgba(76,175,80,0.75); }
    .cron-actions { display: flex; gap: 6px; }
    .cron-copy-btn { flex: 1; background: rgba(76,175,80,0.6); border: none; color: #fff; padding: 7px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.15s; }

    .cron-status { font-size: 10px; opacity: 0.6; margin-top: 8px; min-height: 14px; }

    /* 正则表达式面板 */
    .regex-panel { position: fixed; top: 0; right: 0; width: 340px; height: auto; max-height: 100vh; overflow-y: auto; background: rgba(22,33,62,0.98); color: #fff; padding: 12px 14px 20px; box-shadow: -4px 0 24px rgba(0,0,0,0.3); z-index: 10001; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .regex-panel.show { transform: translateX(0); }
    .regex-panel::-webkit-scrollbar { width: 4px; }
    .regex-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .regex-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

    .regex-close:hover { background: rgba(255,255,255,0.25); }
    .regex-section-title { font-size: 10px; opacity: 0.45; margin-bottom: 6px; margin-top: 4px; }
    .regex-input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 12px; font-family: 'Courier New', monospace; outline: none; margin-bottom: 6px; }
    .regex-input:focus { border-color: rgba(76,175,80,0.75); }
    .regex-input::placeholder { color: rgba(255,255,255,0.3); font-family: -apple-system, sans-serif; }
    .regex-textarea { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 12px; font-family: -apple-system, sans-serif; outline: none; resize: vertical; min-height: 60px; margin-bottom: 6px; }
    .regex-textarea:focus { border-color: rgba(76,175,80,0.75); }
    .regex-textarea::placeholder { color: rgba(255,255,255,0.3); }
    .regex-flags { display: flex; gap: 10px; margin-bottom: 10px; font-size: 11px; }
    .regex-flag { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .regex-flag input { cursor: pointer; }
    .regex-presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .regex-preset { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: background 0.15s; }
    .regex-preset:hover { background: rgba(76,175,80,0.75); }
    .regex-result { background: rgba(0,0,0,0.3); border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-family: 'Courier New', monospace; font-size: 12px; min-height: 18px; word-break: break-all; }

    .regex-copy-btn { flex: 1; background: rgba(76,175,80,0.6); border: none; color: #fff; padding: 7px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.15s; }

    .regex-help-content { background: rgba(22,33,62,0.98); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 10px; margin-bottom: 10px; max-height: 200px; overflow-y: auto; font-size: 10px; line-height: 1.8; color: rgba(255,255,255,0.85); display: none; }

    .regex-help-content .rh-title { font-size: 11px; font-weight: 600; color: #fff; margin: 6px 0 2px; }

<body>
  <div class="header">
    <h1>📌 共享便签</h1>
    <div class="search-box">
      <span class="search-icon"><i class="ph ph-magnifying-glass"></i></span>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索便签内容...">
      <button class="search-clear" id="searchClear"><i class="ph ph-x"></i></button>
      <span class="search-count" id="searchCount"></span>
    </div>
    <button class="toolbox-toggle" id="toolboxToggle" title="工具箱"><i class="ph ph-wrench"></i></button>
  </div>
  <div class="global-toolbox" id="toolbox">
    <div class="global-toolbox-content">
      <button class="global-toolbox-item" id="uploadBtn"><i class="ph ph-image"></i> 上传图片</button>
      <button class="global-toolbox-item" id="fileTransferBtn"><i class="ph ph-folder"></i> 文件互传</button>
      <button class="global-toolbox-item" id="alarmBtn"><i class="ph ph-bell"></i> 定时闹钟</button>
    </div>
  </div>
  <div class="status" id="status">● 连接中...</div>
  <div class="board" id="board"></div>
  <button class="add-btn" id="addBtn" title="新建便签">+</button>
  <link rel="stylesheet" href="phosphor-regular.css">
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="web-tools.js"></script>
  <script>
    const COLORS = ['#ffeb3b','#ff9800','#e91e63','#4caf50','#2196f3','#9c27b0','#00bcd4','#ffffff'];
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const socket = io();
    socket.on('connect', () => { status.textContent = '● 已连接'; status.className = 'status connected'; });
    socket.on('disconnect', () => { status.textContent = '● 已断开'; status.className = 'status'; });

    let activeNoteId = null;
    let activeTextarea = null;
    let toolboxPanel = null;
    let findReplacePanel = null;
    let rsaPanel = null;
    let excelTemplatePanel = null;
    let undoStack = [];
    let markdownPreviewActive = false;
    let markdownPreviewContainer = null;

    async function loadNotes() {
      const res = await fetch('/api/notes');
      const notes = await res.json();
      notes.forEach(n => renderNote(n));
    }

    function renderNote(note) {
      if (document.getElementById('note-' + note.id)) return;
      const el = document.createElement('div');
      el.className = 'note';
      el.id = 'note-' + note.id;
      el.dataset.updatedAt = note.updated_at;
      el.style.left = note.x + 'px';
      el.style.top = note.y + 'px';
      el.style.width = (note.width || 240) + 'px';
      el.style.height = (note.height || 200) + 'px';
      el.style.background = note.color;
      el.style.color = isLight(note.color) ? '#333' : '#fff';
      el.style.opacity = String(note.opacity ?? 1);

      const typeLabel = {text:'文字',image:'图片',file:'文件'}[note.type] || '文字';
      el.innerHTML = `
        <div class="note-header">
          <span class="note-title">${typeLabel}</span>
          <div class="note-actions">
            <button data-action="toolbox" title="工具箱"><i class="ph ph-wrench"></i></button>
            <button data-action="color" title="换颜色"><i class="ph ph-palette"></i></button>
            <button data-action="more" title="更多"><i class="ph ph-dots-three"></i></button>
            <div class="note-dropdown">
              <button data-action="upload"><i class="ph ph-image"></i> 上传图片</button>
              <button data-action="delete"><i class="ph ph-x"></i> 删除</button>
            </div>
          </div>
        </div>
        <div class="note-body">${getBodyHTML(note)}</div>
        <div class="resize-handle"></div>
      `;

      if (note.type === 'text') {
        const ta = el.querySelector('.note-content');
        let timer;
        ta.addEventListener('input', () => {
          clearTimeout(timer);
          timer = setTimeout(() => {
            fetch('/api/notes/' + note.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({content:ta.value}) });
          }, 500);
        });
        ta.addEventListener('focus', () => { activeNoteId = note.id; activeTextarea = ta; });
      }

      if (note.type === 'image') {
        const imgs = el.querySelectorAll('.note-image');
        imgs.forEach(img => img.addEventListener('click', () => showPreview(img.src)));
      }

      setupDrag(el, note);
      setupActions(el, note);
      board.appendChild(el);
    }

    function getBodyHTML(note) {
      if (note.type === 'text') return `<textarea class="note-content" placeholder="输入内容...">${esc(note.content)}</textarea>`;
      if (note.type === 'image') {
        try {
          const urls = JSON.parse(note.content);
          if (Array.isArray(urls)) {
            return `<div class="note-images">${urls.map(u => `<div class="note-image-item"><img class="note-image" src="${esc(u)}"></div>`).join('')}</div>`;
          }
        } catch {}
        return `<div class="note-images"><div class="note-image-item"><img class="note-image" src="${esc(note.content)}"></div></div>`;
      }
      if (note.type === 'file') {
        try {
          return JSON.parse(note.content).map(f => `<a class="note-file" href="${esc(f.url)}" target="_blank" download="${esc(f.originalName)}"><i class="ph ph-file-text"></i> ${esc(f.originalName)} <span style="opacity:0.5;font-size:10px">${formatSize(f.size || 0)}</span></a>`).join('');
        } catch { return `<div>${esc(note.content)}</div>`; }
      }
      return `<div>${esc(note.content)}</div>`;
    }

    function setupDrag(el, note) {
      let dragging = false, resizing = false, sx, sy, sw, sh;
      el.querySelector('.note-header').addEventListener('mousedown', e => {
        if (e.target.closest('.note-actions')) return;
        dragging = true; sx = e.clientX; sy = e.clientY; e.preventDefault();
      });
      el.querySelector('.resize-handle').addEventListener('mousedown', e => {
        resizing = true; sx = e.clientX; sy = e.clientY; sw = el.offsetWidth; sh = el.offsetHeight; e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (dragging) { el.style.left = (el.offsetLeft + e.clientX - sx) + 'px'; el.style.top = (el.offsetTop + e.clientY - sy) + 'px'; sx = e.clientX; sy = e.clientY; }
        if (resizing) { el.style.width = Math.max(180, sw + e.clientX - sx) + 'px'; el.style.height = Math.max(120, sh + e.clientY - sy) + 'px'; }
      });
      document.addEventListener('mouseup', () => {
        if (dragging || resizing) { dragging = false; resizing = false; fetch('/api/notes/' + note.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({x:el.offsetLeft, y:el.offsetTop, width:el.offsetWidth, height:el.offsetHeight}) }); }
      });
    }

    function setupActions(el, note) {
      el.addEventListener('click', async e => {
        const a = e.target.dataset.action;
        if (a === 'more') {
          const dd = el.querySelector('.note-dropdown');
          if (dd) dd.classList.toggle('show');
          e.stopPropagation();
          return;
        }
        if (a === 'toolbox') {
          activeNoteId = note.id;
          const ta = el.querySelector('.note-content');
          if (ta) activeTextarea = ta;
          openWebToolbox();
          return;
        }
        if (a === 'delete') {
          el.querySelector('.note-dropdown').classList.remove('show');
          await fetch('/api/notes/' + note.id, {method:'DELETE'});
          el.remove();
        }
        if (a === 'upload') {
          el.querySelector('.note-dropdown').classList.remove('show');
          const input = document.createElement('input');
          input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
          input.addEventListener('change', async () => {
            const files = Array.from(input.files).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;
            const existing = note.type === 'image' ? (() => { try { return JSON.parse(note.content); } catch { return [note.content]; } })() : [];
            const uploaded = [];
            for (const file of files) {
              const fd = new FormData(); fd.append('file', file);
              const res = await fetch('/api/upload', { method: 'POST', body: fd });
              const data = await res.json();
              uploaded.push(data.url);
            }
            const merged = existing.concat(uploaded);
            const content = JSON.stringify(merged);
            await fetch('/api/notes/' + note.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type:'image', content }) });
            note.type = 'image'; note.content = content;
            el.querySelector('.note-body').innerHTML = getBodyHTML(note);
            el.querySelectorAll('.note-image').forEach(img => img.addEventListener('click', () => showPreview(img.src)));
          });
          input.click();
        }
        if (a === 'color') {
          let picker = el.querySelector('.color-picker');
          if (picker) { picker.remove(); return; }
          picker = document.createElement('div');
          picker.className = 'color-picker';
          picker.style.flexDirection = 'column';
          picker.style.gap = '4px';
          COLORS.forEach(c => {
            const d = document.createElement('div');
            d.className = 'color-dot' + (c === note.color ? ' active' : '');
            d.style.background = c;
            d.onclick = async () => { el.style.background = c; el.style.color = isLight(c)?'#333':'#fff'; note.color = c; await fetch('/api/notes/'+note.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({color:c})}); picker.remove(); };
            picker.appendChild(d);
          });
          // 透明度滑块
          const opRow = document.createElement('div');
          opRow.style.cssText = 'display:flex;align-items:center;gap:6px;width:100%;';
          const opLabel = document.createElement('span');
          opLabel.style.cssText = 'font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;';
          opLabel.textContent = '透明度';
          const opSlider = document.createElement('input');
          opSlider.type = 'range'; opSlider.min = '0.1'; opSlider.max = '1'; opSlider.step = '0.05';
          opSlider.value = String(note.opacity ?? 1);
          opSlider.style.cssText = 'flex:1;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.2);border-radius:2px;outline:none;';
          const opVal = document.createElement('span');
          opVal.style.cssText = 'font-size:10px;color:rgba(255,255,255,0.7);min-width:28px;text-align:right;';
          opVal.textContent = Math.round((note.opacity ?? 1) * 100) + '%';
          opSlider.addEventListener('input', () => { el.style.opacity = opSlider.value; opVal.textContent = Math.round(parseFloat(opSlider.value) * 100) + '%'; });
          opSlider.addEventListener('change', () => { const v = parseFloat(opSlider.value); note.opacity = v; fetch('/api/notes/'+note.id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({opacity:v})}); });
          opRow.appendChild(opLabel); opRow.appendChild(opSlider); opRow.appendChild(opVal);
          picker.appendChild(opRow);
          el.appendChild(picker);
          setTimeout(() => { const close = ev => { if (!picker.contains(ev.target)) { picker.remove(); document.removeEventListener('click',close); } }; document.addEventListener('click',close); }, 0);
        }
      });
    }

    document.getElementById('addBtn').addEventListener('click', async () => {
      const x = 100 + Math.random() * (window.innerWidth - 350);
      const y = 100 + Math.random() * (window.innerHeight - 300);
      await fetch('/api/notes', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type:'text', x, y, color:COLORS[Math.floor(Math.random()*COLORS.length)]}) });
    });

    // ============ 上传图片 ============
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadInput = document.createElement('input');
    uploadInput.type = 'file'; uploadInput.accept = 'image/*'; uploadInput.multiple = true; uploadInput.style.display = 'none';
    document.body.appendChild(uploadInput);
    uploadBtn.addEventListener('click', () => uploadInput.click());
    uploadInput.addEventListener('change', async (e) => {

      if (opts.digits) chars += '0123456789';
      if (opts.symbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
      if (!chars) chars = 'abcdefghijklmnopqrstuvwxyz';
      const arr = new Uint32Array(length);
      crypto.getRandomValues(arr);
      return Array.from(arr, v => chars[v % chars.length]).join('');
    }

    const CRON_PRESETS = [

      { label: '每天0点', expr: '0 0 * * *' },

      { label: '工作日9点', expr: '0 9 * * 1-5' },
      { label: '每30秒', expr: '* * * * * *' },
    ];

    const CRON_NAMES = ['秒', '分', '时', '日', '月', '周'];
    const CRON_DAYS = ['日', '一', '二', '三', '四', '五', '六'];

    function parseCronField(field, min, max) {
      if (field === '*') return `每${max === 59 ? '分钟' : max === 23 ? '小时' : max === 6 ? '周' : max === 31 ? '天' : max === 59 ? '秒' : '月'}`;
      const results = [];
      const parts = field.split(',');
      for (const part of parts) {
        if (part.includes('/')) {
          const [start, step] = part.split('/');
          results.push(`从${start === '*' ? min : start}开始每隔${step}`);
        } else if (part.includes('-')) {
          const [a, b] = part.split('-');
          results.push(`${a}-${b}`);
        } else {
          results.push(part);
        }
      }
      return results.join(',');
    }

    function describeCron(fields) {
      if (fields.length < 5) return '';
      const [min, hour, day, month, dow] = fields;
      const parts = [];
      if (month !== '*') parts.push(`月${parseCronField(month, 1, 12)}`);
      if (day !== '*') parts.push(`日${parseCronField(day, 1, 31)}`);
      if (dow !== '*') {
        const dowNames = dow.split(',').map(d => CRON_DAYS[parseInt(d)] || d).join(',');
        parts.push(`周${dowNames}`);
      }
      if (hour !== '*') parts.push(`${hour}时`);
      if (min !== '*') parts.push(`${min}分`);
      if (parts.length === 0) return '每分钟执行';
      return parts.join(' ') + ' 执行';
    }

    function getNextRuns(expr, count = 5) {
      const fields = expr.trim().split(/\s+/);
      if (fields.length < 5) return [];
      const [minF, hourF, dayF, monthF, dowF] = fields;
      const runs = [];
      const d = new Date();
      d.setSeconds(0);
      d.setMilliseconds(0);
      d.setMinutes(d.getMinutes() + 1);
      const maxIter = 366 * 24 * 60;
      for (let i = 0; i < maxIter && runs.length < count; i++) {
        if (!matchCronField(d.getMinutes(), minF)) { d.setMinutes(d.getMinutes() + 1); continue; }
        if (!matchCronField(d.getHours(), hourF)) { d.setMinutes(d.getMinutes() + 1); continue; }
        if (!matchCronField(d.getDate(), dayF)) { d.setDate(d.getDate() + 1); d.setHours(0); d.setMinutes(0); continue; }
        if (!matchCronField(d.getMonth() + 1, monthF)) { d.setDate(d.getDate() + 1); d.setHours(0); d.setMinutes(0); continue; }
        if (!matchCronField(d.getDay(), dowF)) { d.setDate(d.getDate() + 1); d.setHours(0); d.setMinutes(0); continue; }
        runs.push(new Date(d));
        d.setMinutes(d.getMinutes() + 1);
      }
      return runs;
    }

    function matchCronField(val, field) {
      if (field === '*') return true;
      for (const part of field.split(',')) {
        if (part.includes('/')) {
          const [start, step] = part.split('/');
          const s = start === '*' ? 0 : parseInt(start);
          if (val >= s && (val - s) % parseInt(step) === 0) return true;
        } else if (part.includes('-')) {
          const [a, b] = part.split('-').map(Number);
          if (val >= a && val <= b) return true;
        } else {
          if (val === parseInt(part)) return true;
        }
      }
      return false;
    }

      function updateRegexResult() {
        const pattern = panel.querySelector('#regexPattern').value;
        const text = panel.querySelector('#regexTestText').value;

        const matchesEl = panel.querySelector('#regexMatches');
        if (!pattern) {
          resultEl.textContent = '-';

        try {
          const flags = getFlags();
          const re = new RegExp(pattern, flags);
          resultEl.textContent = '/' + pattern + '/' + flags;
          if (!text) {
            matchesEl.innerHTML = '<span class="regex-no-match">输入测试文本查看匹配</span>';
            return;
          }
          const matches = [];
          let m;
          if (flags.includes('g')) {
            while ((m = re.exec(text)) !== null) {
              matches.push({ value: m[0], index: m.index, groups: m.slice(1) });
              if (m[0].length === 0) re.lastIndex++;

          } else {
            m = re.exec(text);
            if (m) matches.push({ value: m[0], index: m.index, groups: m.slice(1) });
          }
          if (matches.length === 0) {
            matchesEl.innerHTML = '<span class="regex-no-match">无匹配结果</span>';

            matchesEl.innerHTML = matches.map((m, i) => {
              let html = `<span class="regex-match">${esc(m.value)}</span>`;

          resultEl.textContent = '错误: ' + err.message;

    // ============ 谷歌校验码 (TOTP) ============

    function totpBase32Decode(encoded) {
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      encoded = encoded.replace(/[\s=]/g, '').toUpperCase();
      let bits = '';
      for (const c of encoded) {
        const val = alphabet.indexOf(c);
        if (val === -1) continue;
        bits += val.toString(2).padStart(5, '0');
      }
      const bytes = new Uint8Array(Math.floor(bits.length / 8));
      for (let i = 0; i < bytes.length; i++) {
        bytes[i] = parseInt(bits.slice(i * 8, i * 8 + 8), 2);
      }
      return bytes;
    }

    async function totpGenerateCode(secret, period = 30, digits = 6) {
      const keyBytes = totpBase32Decode(secret);
      const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
      const time = Math.floor(Date.now() / 1000 / period);
      const timeBytes = new ArrayBuffer(8);
      const view = new DataView(timeBytes);
      view.setUint32(4, time, false);
      const hmac = new Uint8Array(await crypto.subtle.sign('HMAC', key, timeBytes));
      const offset = hmac[hmac.length - 1] & 0x0f;
      const code = ((hmac[offset] & 0x7f) << 24 | (hmac[offset + 1] & 0xff) << 16 | (hmac[offset + 2] & 0xff) << 8 | (hmac[offset + 3] & 0xff)) % Math.pow(10, digits);
      return String(code).padStart(digits, '0');
    }

    function totpLoadAccounts() {
      try { return JSON.parse(localStorage.getItem(TOTP_STORAGE_KEY) || '[]'); } catch { return []; }
    }

      localStorage.setItem(TOTP_STORAGE_KEY, JSON.stringify(accounts));

    async function updateTotpCodes() {
      if (!totpPanel) return;
      const accounts = totpLoadAccounts();
      const items = totpPanel.querySelectorAll('.totp-item');
      const period = 30;
      const now = Math.floor(Date.now() / 1000);
      const remaining = period - (now % period);
      for (let i = 0; i < items.length && i < accounts.length; i++) {
        const code = await totpGenerateCode(accounts[i].secret);
        const codeEl = items[i].querySelector('.totp-code');
        if (!codeEl.classList.contains('copied')) codeEl.textContent = code.slice(0, 3) + ' ' + code.slice(3);
        const bar = items[i].querySelector('.totp-progress-bar');
        bar.style.width = (remaining / period * 100) + '%';
        bar.style.background = remaining <= 5 ? '#f44336' : '#4caf50';
        const meta = items[i].querySelector('.totp-item-meta');
        meta.textContent = `${remaining}s 后刷新`;

    function pushUndoSnapshot(ta) {

    function doReplace(scope) {
      if (!activeTextarea || !findReplacePanel) return;
      const findVal = findReplacePanel.querySelector('.fr-find').value;
      const replaceVal = findReplacePanel.querySelector('.fr-replace').value;
      const useRegex = findReplacePanel.querySelector('.fr-regex').checked;
      const caseSensitive = findReplacePanel.querySelector('.fr-case').checked;
      const statusEl = findReplacePanel.querySelector('.fr-status');
      if (findVal === '') { statusEl.textContent = '请输入查找内容'; return; }
      const { selectionStart: s, selectionEnd: e, value } = activeTextarea;
      const hasSelection = s !== e;
      const target = hasSelection ? value.slice(s, e) : value;
      let pattern;
      try {
        const flags = (scope === 'all' ? 'g' : '') + (caseSensitive ? '' : 'i');
        pattern = useRegex ? new RegExp(findVal, flags) : new RegExp(findVal.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
      } catch (err) { statusEl.textContent = '正则错误: ' + err.message; return; }
      const countPattern = new RegExp(pattern.source, pattern.flags.includes('g') ? pattern.flags : pattern.flags + 'g');
      const count = (target.match(countPattern) || []).length;
      if (count === 0) { statusEl.textContent = '未找到匹配项'; return; }
      pushUndoSnapshot(activeTextarea);
      const replaced = target.replace(pattern, replaceVal);
      activeTextarea.value = hasSelection ? value.slice(0, s) + replaced + value.slice(e) : replaced;
      activeTextarea.focus();
      saveContent(activeTextarea.value);
      refreshWebToolboxStats();
      statusEl.textContent = `已替换 ${scope === 'all' ? count : 1} 处`;

        } catch (err) { panel.querySelector('.rsa-status').textContent = '错误: ' + err.message; }
      });
      panel.querySelector('.rsa-enc').addEventListener('click', () => {
        try {
          const pub = panel.querySelector('.rsa-pub').value;
          const batch = panel.querySelector('.rsa-batch').checked;
          const input = activeTextarea ? activeTextarea.value : '';
          const result = batch ? input.split('\n').map(l => l.trim() ? rsaEncrypt(l, pub) : l).join('\n') : rsaEncrypt(input, pub);
          if (activeTextarea) { pushUndoSnapshot(activeTextarea); activeTextarea.value = result; saveContent(result); }
          panel.querySelector('.rsa-status').textContent = '加密完成';
        } catch (err) { panel.querySelector('.rsa-status').textContent = '错误: ' + err.message; }
      });
      panel.querySelector('.rsa-dec').addEventListener('click', () => {
        try {
          const priv = panel.querySelector('.rsa-priv').value;
          const batch = panel.querySelector('.rsa-batch').checked;
          const input = activeTextarea ? activeTextarea.value : '';
          const result = batch ? input.split('\n').map(l => l.trim() ? rsaDecrypt(l, priv) : l).join('\n') : rsaDecrypt(input, priv);
          if (activeTextarea) { pushUndoSnapshot(activeTextarea); activeTextarea.value = result; saveContent(result); }
          panel.querySelector('.rsa-status').textContent = '解密完成';
        } catch (err) { panel.querySelector('.rsa-status').textContent = '错误: ' + err.message; }
      });
      document.body.appendChild(panel);
      setTimeout(() => panel.classList.add('show'), 10);
      rsaPanel = panel;
    }
    function closeRsaPanel() { if (rsaPanel) { rsaPanel.classList.remove('show'); setTimeout(() => { if (rsaPanel) { rsaPanel.remove(); rsaPanel = null; } }, 300); } }

    // ============ Excel 模板 ============
    let excelData = null;
    function openExcelTemplate() {
      if (excelTemplatePanel) { closeExcelTemplate(); return; }
      const panel = document.createElement('div');
      panel.className = 'excel-template';
      panel.innerHTML = `
        <div class="et-header"><span class="et-title"><i class="ph ph-file-xls"></i> Excel 模板生成</span><button class="et-close" title="关闭"><i class="ph ph-x"></i></button></div>
        <button class="et-upload-btn"><i class="ph ph-folder"></i> 上传 Excel 文件</button>
        <div class="et-info">上传 Excel 文件后，点击列名插入占位符，生成模板文本。</div>
        <div class="et-columns"></div>
        <textarea class="et-template" placeholder="输入模板，如：INSERT INTO table (name) VALUES ('{name}')"></textarea>
        <div class="et-actions">
          <button class="et-btn et-generate">⚡ 生成</button>
          <button class="et-btn et-preview-btn">👁 预览</button>
        </div>
        <div class="et-preview"></div>
      `;
      panel.querySelector('.et-close').addEventListener('click', closeExcelTemplate);
      panel.querySelector('.et-upload-btn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.xlsx,.xls,.csv';
        input.addEventListener('change', () => {
          const file = input.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const wb = XLSX.read(e.target.result, { type: 'array' });
              const ws = wb.Sheets[wb.SheetNames[0]];
              excelData = XLSX.utils.sheet_to_json(ws);
              const cols = Object.keys(excelData[0] || {});
              const colsEl = panel.querySelector('.et-columns');
              colsEl.innerHTML = '';
              cols.forEach(col => {
                const chip = document.createElement('span'); chip.className = 'et-col-chip'; chip.textContent = col;
                chip.addEventListener('click', () => {
                  const ta = panel.querySelector('.et-template');
                  const pos = ta.selectionStart;
                  ta.value = ta.value.slice(0, pos) + '{' + col + '}' + ta.value.slice(pos);
                  ta.focus();
                });
                colsEl.appendChild(chip);
              });
              panel.querySelector('.et-info').textContent = `已加载 ${excelData.length} 行数据，${cols.length} 列`;
            } catch (err) { panel.querySelector('.et-info').textContent = '解析失败: ' + err.message; }
          };
          reader.readAsArrayBuffer(file);
        });
        input.click();
      });
      panel.querySelector('.et-generate').addEventListener('click', () => {
        if (!excelData || !activeTextarea) return;
        const tpl = panel.querySelector('.et-template').value;
        const result = excelData.map(row => {
          let line = tpl;
          Object.entries(row).forEach(([k, v]) => { line = line.replace(new RegExp('\\{' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\}', 'g'), String(v ?? '')); });
          return line;
        }).join('\n');
        pushUndoSnapshot(activeTextarea);
        activeTextarea.value = result;
        saveContent(result);
      });
      panel.querySelector('.et-preview-btn').addEventListener('click', () => {
        if (!excelData) return;
        const tpl = panel.querySelector('.et-template').value;
        const row = excelData[0];
        let line = tpl;
        Object.entries(row).forEach(([k, v]) => { line = line.replace(new RegExp('\\{' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\}', 'g'), String(v ?? '')); });
        panel.querySelector('.et-preview').textContent = line;
      });
      document.body.appendChild(panel);
      setTimeout(() => panel.classList.add('show'), 10);
      excelTemplatePanel = panel;
    }
    function closeExcelTemplate() { if (excelTemplatePanel) { excelTemplatePanel.classList.remove('show'); setTimeout(() => { if (excelTemplatePanel) { excelTemplatePanel.remove(); excelTemplatePanel = null; } }, 300); } }

    // ============ Markdown 预览 ============
    function toggleMarkdownPreview() {
      if (!activeTextarea) return;
      if (markdownPreviewActive) {
        if (markdownPreviewContainer) { markdownPreviewContainer.remove(); markdownPreviewContainer = null; }
        activeTextarea.style.display = '';
        markdownPreviewActive = false;
      } else {
        markdownPreviewActive = true;
        activeTextarea.style.display = 'none';
        markdownPreviewContainer = document.createElement('div');
        markdownPreviewContainer.className = 'markdown-preview';
        markdownPreviewContainer.innerHTML = marked.parse(activeTextarea.value || '*暂无内容*');
        activeTextarea.parentNode.appendChild(markdownPreviewContainer);
        markdownPreviewContainer.addEventListener('click', () => toggleMarkdownPreview());
      }
    }

    // ============ 打开工具箱（带完整功能） ============
    function openWebToolbox() {
      if (toolboxPanel) { closeWebToolbox(); return; }
      if (!activeTextarea) return;
      undoStack = [];

      const panel = document.createElement('div');
      panel.className = 'web-toolbox';
      panel.innerHTML = `
        <div class="wtb-header">
          <span class="wtb-title"><i class="ph ph-wrench"></i> 文本工具</span>
            <button class="wtb-copy" title="复制全部"><i class="ph ph-copy"></i></button>
            <button class="wtb-clear" title="清空"><i class="ph ph-trash"></i></button>
            <button class="wtb-undo" title="撤回" disabled><i class="ph ph-arrow-u-up-left"></i></button>
            <button class="wtb-close" title="关闭"><i class="ph ph-x"></i></button>
          </div>
        </div>
        <div class="wtb-stats"></div>
        <div class="wtb-groups"></div>
      `;
      const groups = panel.querySelector('.wtb-groups');
      TOOL_GROUPS.forEach(group => {
        const g = document.createElement('div'); g.className = 'wtb-group';
        const label = document.createElement('div'); label.className = 'wtb-group-title'; label.textContent = group.title; g.appendChild(label);
        const btns = document.createElement('div'); btns.className = 'wtb-btns';
        group.items.forEach(item => {
          const b = document.createElement('button'); b.className = 'wtb-btn'; b.textContent = item.label;
          b.addEventListener('click', () => {
            if (item.action === 'panel') { item.key === 'pwdGen' ? openPwdGenPanel() : item.key === 'cron' ? openCronPanel() : item.key === 'regex' ? openRegexPanel() : openTotpPanel(); return; }
            applyWebTool(TEXT_TOOLS[item.key]);
          });
          btns.appendChild(b);
        });
        g.appendChild(btns); groups.appendChild(g);
      });

      // 附加功能按钮
      const extraGroup = document.createElement('div'); extraGroup.className = 'wtb-group';
      extraGroup.innerHTML = `<div class="wtb-group-title">高级功能</div>`;
      const extraBtns = document.createElement('div'); extraBtns.className = 'wtb-btns';
      [{label:'<i class="ph ph-magnifying-glass"></i> 查找替换', fn: openFindReplace}, {label:'<i class="ph ph-lock-key"></i> RSA加解密', fn: openRsaPanel}, {label:'<i class="ph ph-file-xls"></i> Excel模板', fn: openExcelTemplate}, {label:'<i class="ph ph-note"></i> Markdown预览', fn: toggleMarkdownPreview}].forEach(item => {
        const b = document.createElement('button'); b.className = 'wtb-btn'; b.textContent = item.label;
        b.addEventListener('click', item.fn);
        extraBtns.appendChild(b);
      });
      extraGroup.appendChild(extraBtns); groups.appendChild(extraGroup);

      panel.querySelector('.wtb-close').addEventListener('click', closeWebToolbox);
      panel.querySelector('.wtb-copy').addEventListener('click', () => {
        navigator.clipboard.writeText(activeTextarea.value).catch(() => { const ta = document.createElement('textarea'); ta.value = activeTextarea.value; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); });
      });
      panel.querySelector('.wtb-clear').addEventListener('click', () => {
        pushUndoSnapshot(activeTextarea); activeTextarea.value = ''; saveContent(''); refreshWebToolboxStats();
      });
      panel.querySelector('.wtb-undo').addEventListener('click', undoLastEdit);
      document.body.appendChild(panel);
      setTimeout(() => panel.classList.add('show'), 10);
      toolboxPanel = panel;
      activeTextarea.addEventListener('select', refreshWebToolboxStats);
      activeTextarea.addEventListener('keyup', refreshWebToolboxStats);
      activeTextarea.addEventListener('click', refreshWebToolboxStats);
      refreshWebToolboxStats();
    }

    // ============ ESC 关闭所有面板 ============
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeWebToolbox(); closeFindReplace(); closeRsaPanel(); closeExcelTemplate(); closePwdGenPanel(); closeCronPanel(); closeRegexPanel();
        toolbox.classList.remove('show');
      }
      // Ctrl+F / Cmd+F 查找替换
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        openFindReplace();
      }
    });

    // ============ 粘贴图片 ============
    document.addEventListener('paste', async (e) => {
      if (!activeNoteId) return;
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      const imageFiles = [];
      for (const item of items) {
        if (item.kind === 'file' && item.type.startsWith('image/')) {
          const f = item.getAsFile();
          if (f) imageFiles.push(f);
        }
      }
      if (imageFiles.length === 0) return;
      e.preventDefault();
      for (const file of imageFiles) {
        const fd = new FormData(); fd.append('file', file);
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        const noteEl = document.getElementById('note-' + activeNoteId);
        if (!noteEl) continue;
        const note = { id: activeNoteId };
        const existing = (() => { try { return JSON.parse(noteEl.querySelector('.note-content') ? '' : '[]'); } catch { return []; } })();
        existing.push(data.url);
        const content = JSON.stringify(existing);
        await fetch('/api/notes/' + activeNoteId, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type:'image', content }) });
      }
    });

    // ============ 拖拽上传 ============
    board.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    board.addEventListener('drop', async e => {
      e.preventDefault();
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (!files.length) return;
      for (const file of files) {
        const fd = new FormData(); fd.append('file', file);
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        const x = e.clientX - 120; const y = e.clientY - 100;
        await fetch('/api/notes', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type:'image', content:data.url, x, y, color:COLORS[Math.floor(Math.random()*COLORS.length)]}) });
      }
    });

    // ============ 实时同步 ============
    socket.on('note:created', n => renderNote(n));
    socket.on('note:deleted', ({ id }) => { const el = document.getElementById('note-' + id); if (el) el.remove(); });
    socket.on('note:updated', n => {
      const el = document.getElementById('note-' + n.id);
      if (!el) return;
      const ta = el.querySelector('.note-content');
      if (ta && document.hasFocus() && document.activeElement === ta) return;
      el.style.left = n.x+'px'; el.style.top = n.y+'px';
      el.style.width = (n.width||240)+'px'; el.style.height = (n.height||200)+'px';
      el.style.background = n.color; el.style.color = isLight(n.color)?'#333':'#fff';
      if (ta && ta.value !== (n.content || '')) ta.value = n.content || '';
    });
    setInterval(async () => {
      try {
        const res = await fetch('/api/notes');
        const notes = await res.json();
        notes.forEach(n => {
          const el = document.getElementById('note-' + n.id);
          if (!el) { renderNote(n); return; }
          const ta = el.querySelector('.note-content');
          if (ta && document.hasFocus() && document.activeElement === ta) return;
          el.style.left = n.x+'px'; el.style.top = n.y+'px';
          el.style.width = (n.width||240)+'px'; el.style.height = (n.height||200)+'px';
          el.style.background = n.color; el.style.color = isLight(n.color)?'#333':'#fff';
          if (ta && ta.value !== (n.content || '')) ta.value = n.content || '';
        });
        document.querySelectorAll('.note').forEach(el => { const id = el.id.replace('note-', ''); if (!notes.find(n => n.id === id)) el.remove(); });
      } catch (e) {}
    }, 3000);

    function showPreview(src) {
      const o = document.createElement('div');
      o.className = 'image-overlay';
      o.innerHTML = `<img src="${src}">`;
      o.addEventListener('click', () => o.remove());
      document.body.appendChild(o);
    }

    loadNotes();
  </script>
</body>
</html>
